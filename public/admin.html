<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baansiam Connect | Admin Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <h1 class="text-3xl font-bold tracking-tight">Admin Dashboard</h1>
        <button
          id="refreshBtn"
          class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-black"
        >
          รีเฟรชข้อมูล
        </button>
      </div>

      <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="overflow-x-auto">
          <table class="min-w-full text-left text-sm">
            <thead class="bg-slate-100 text-slate-700">
              <tr>
                <th class="px-4 py-3 font-semibold">Name</th>
                <th class="px-4 py-3 font-semibold">Phone</th>
                <th class="px-4 py-3 font-semibold">Service</th>
                <th class="px-4 py-3 font-semibold">Package</th>
                <th class="px-4 py-3 font-semibold">Price</th>
                <th class="px-4 py-3 font-semibold">Status</th>
              </tr>
            </thead>
            <tbody id="leadTableBody"></tbody>
          </table>
        </div>
      </div>
      <p id="dashboardMessage" class="mt-3 text-sm text-slate-600"></p>
    </main>

    <script>
      const bodyEl = document.getElementById("leadTableBody");
      const messageEl = document.getElementById("dashboardMessage");

      const formatTHB = (value) =>
        new Intl.NumberFormat("th-TH", { style: "currency", currency: "THB", maximumFractionDigits: 0 }).format(value);

      const fetchLeads = async () => {
        try {
          const response = await fetch("/api/leads");
          const result = await response.json();

          if (!response.ok || !result.success) throw new Error("โหลดข้อมูลไม่สำเร็จ");

          renderRows(result.data);
          messageEl.textContent = `ทั้งหมด ${result.data.length} lead`;
        } catch (error) {
          messageEl.textContent = `เกิดข้อผิดพลาด: ${error.message}`;
          messageEl.className = "mt-3 text-sm text-red-600";
        }
      };

      const updateStatus = async (id, status) => {
        try {
          const response = await fetch(`/api/leads/${id}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
          });
          const result = await response.json();
          if (!response.ok || !result.success) throw new Error(result.message || "อัปเดตสถานะไม่สำเร็จ");
          fetchLeads();
        } catch (error) {
          messageEl.textContent = `เกิดข้อผิดพลาด: ${error.message}`;
          messageEl.className = "mt-3 text-sm text-red-600";
        }
      };

      const renderRows = (leads) => {
        bodyEl.innerHTML = "";

        if (!leads.length) {
          bodyEl.innerHTML =
            '<tr><td colspan="6" class="px-4 py-6 text-center text-slate-500">ยังไม่มีข้อมูล lead</td></tr>';
          return;
        }

        leads.forEach((lead) => {
          const row = document.createElement("tr");
          row.className = "border-t border-slate-100";
          row.innerHTML = `
            <td class="px-4 py-3">${lead.name}</td>
            <td class="px-4 py-3">${lead.phone}</td>
            <td class="px-4 py-3">${lead.selectedService}</td>
            <td class="px-4 py-3">${lead.selectedPackage}</td>
            <td class="px-4 py-3">${formatTHB(lead.price || 0)}</td>
            <td class="px-4 py-3">
              <select data-id="${lead.id}" class="rounded-lg border border-slate-300 px-2 py-1 text-sm">
                <option value="new" ${lead.status === "new" ? "selected" : ""}>new</option>
                <option value="contacted" ${lead.status === "contacted" ? "selected" : ""}>contacted</option>
                <option value="closed" ${lead.status === "closed" ? "selected" : ""}>closed</option>
              </select>
            </td>
          `;

          const statusEl = row.querySelector("select");
          statusEl.addEventListener("change", (event) => {
            updateStatus(lead.id, event.target.value);
          });

          bodyEl.appendChild(row);
        });
      };

      document.getElementById("refreshBtn").addEventListener("click", fetchLeads);

      fetchLeads();
    </script>
  </body>
</html>
